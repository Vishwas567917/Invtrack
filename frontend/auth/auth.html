<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InvTrack - Authentication</title>
    <link rel="stylesheet" href="./auth.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div class="auth-container">
      <div class="auth-box">
        <div class="auth-header">
          <h1><i class="fas fa-shopping-bag"></i> InvTrack</h1>
          <p>Smart Inventory Management</p>
        </div>

        <div id="alert" class="alert"></div>

        <div id="loginForm">
          <div class="auth-tabs">
            <button class="auth-tab active" onclick="switchTab('login')">
              Login
            </button>
            <button class="auth-tab" onclick="switchTab('signup')">
              Sign Up
            </button>
          </div>

          <div class="form-group">
            <label for="loginEmail">Email</label>
            <input type="email" id="loginEmail" placeholder="your@email.com" />
          </div>

          <div class="form-group">
            <label for="loginPassword">Password</label>
            <input type="password" id="loginPassword" placeholder="password" />
          </div>

          <button class="btn btn-primary" onclick="handleLogin()">Login</button>

          <div class="text-center" style="margin-top: 1.5rem">
            <p style="font-size: 12px; color: #6b7280; margin-bottom: 0.5rem">
              Demo Accounts:
            </p>
            <p style="font-size: 11px; margin: 0.25rem 0">
              <strong>Customer:</strong> customer@test.com / test123
            </p>
            <p style="font-size: 11px; margin: 0.25rem 0">
              <strong>Shopkeeper:</strong> shop@test.com / test123
            </p>
            <p style="font-size: 11px; margin: 0.25rem 0">
              <strong>Admin (Login Only):</strong> admin@invtrack.com /
              Admin@123
            </p>
          </div>
        </div>

        <div id="signupForm" style="display: none">
          <div class="auth-tabs">
            <button class="auth-tab" onclick="switchTab('login')">Login</button>
            <button class="auth-tab active" onclick="switchTab('signup')">
              Sign Up
            </button>
          </div>

          <label
            style="
              display: block;
              font-size: 14px;
              font-weight: 600;
              margin-bottom: 1rem;
            "
            >Select Role</label
          >

          <div class="role-selector" style="margin-bottom: 1rem">
            <button
              class="role-btn active"
              onclick="selectRole(this, 'customer')"
            >
              <i class="fas fa-user"></i> Customer
            </button>
            <button class="role-btn" onclick="selectRole(this, 'shopkeeper')">
              <i class="fas fa-store"></i> Shopkeeper
            </button>
            <button
              class="role-btn"
              onclick="
                alert('Admin accounts can only be created by the system')
              "
              disabled
              style="opacity: 0.5; cursor: not-allowed"
            >
              <i class="fas fa-shield-alt"></i> Admin
            </button>
          </div>

          <div class="form-group">
            <label for="signupName">Full Name</label>
            <input type="text" id="signupName" placeholder="John Doe" />
          </div>

          <div class="form-group">
            <label for="signupEmail">Email</label>
            <input type="email" id="signupEmail" placeholder="your@email.com" />
          </div>

          <div class="form-group">
            <label for="signupPassword">Password</label>
            <input type="password" id="signupPassword" placeholder="••••••••" />
          </div>

          <div id="shopkeeperFields" style="display: none">
            <div class="form-group">
              <label for="storeName">Shop Name</label>
              <input type="text" id="storeName" placeholder="My Shop" />
            </div>
            <div class="form-group">
              <label for="storeCity">City</label>
              <input type="text" id="storeCity" placeholder="New Delhi" />
            </div>
            <div class="form-group">
              <label for="storeAddress">Address</label>
              <input
                type="text"
                id="storeAddress"
                placeholder="123 Market Street"
              />
            </div>
            <div class="form-group">
              <label for="storePhone">Phone</label>
              <input type="tel" id="storePhone" placeholder="+91 9876543210" />
            </div>
            <div class="form-group">
              <label for="storeLat">Latitude</label>
              <input
                type="number"
                id="storeLat"
                placeholder="28.6139"
                step="0.0001"
              />
            </div>
            <div class="form-group">
              <label for="storeLon">Longitude</label>
              <input
                type="number"
                id="storeLon"
                placeholder="77.2090"
                step="0.0001"
              />
            </div>
          </div>

          <button class="btn btn-primary" onclick="handleSignup()">
            Create Account
          </button>
        </div>
      </div>
    </div>
    <script src="../shared/api.js"></script>
    <script src="./auth.js" defer></script>
  </body>
</html>
