<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InvTrack - Authentication</title>
    <link rel="stylesheet" href="./auth.css" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div class="auth-container">
      <div class="auth-box">
        <div class="auth-header">
          <h1><i class="fas fa-shopping-bag"></i> InvTrack</h1>
          <p>Smart Inventory Management</p>
        </div>

        <div id="alert" class="alert"></div>

        <div id="loginForm">
          <div class="auth-tabs">
            <button
              class="auth-tab active"
              id="tab-login"
              onclick="switchTab('login')"
            >
              Login
            </button>
            <button
              class="auth-tab"
              id="tab-signup"
              onclick="switchTab('signup')"
            >
              Sign Up
            </button>
          </div>
          <div class="form-group">
            <label for="loginEmail">Email</label>
            <input type="email" id="loginEmail" placeholder="your@email.com" />
          </div>
          <div class="form-group">
            <label for="loginPassword">Password</label>
            <input type="password" id="loginPassword" placeholder="password" />
          </div>
          <button class="btn btn-primary" onclick="handleLogin()">Login</button>
        </div>

        <div id="signupForm" style="display: none">
          <div class="auth-tabs">
            <button
              class="auth-tab"
              id="tab-login-switch"
              onclick="switchTab('login')"
            >
              Login
            </button>
            <button
              class="auth-tab active"
              id="tab-signup-switch"
              onclick="switchTab('signup')"
            >
              Sign Up
            </button>
          </div>

          <label
            style="
              display: block;
              font-size: 14px;
              font-weight: 600;
              margin-bottom: 1rem;
            "
            >Select Role</label
          >
          <div
            class="role-selector"
            style="margin-bottom: 1rem; display: flex; gap: 10px"
          >
            <button
              class="role-btn active"
              onclick="selectRole(this, 'customer')"
            >
              <i class="fas fa-user"></i> Customer
            </button>
            <button class="role-btn" onclick="selectRole(this, 'shopkeeper')">
              <i class="fas fa-store"></i> Shopkeeper
            </button>
          </div>

          <div class="form-group">
            <label for="signupName">Full Name</label>
            <input type="text" id="signupName" placeholder="John Doe" />
          </div>
          <div class="form-group">
            <label for="signupEmail">Email</label>
            <input type="email" id="signupEmail" placeholder="your@email.com" />
          </div>
          <div class="form-group">
            <label for="signupPassword">Password</label>
            <input type="password" id="signupPassword" placeholder="password" />
          </div>

          <div id="shopkeeperFields" style="display: none">
            <div class="form-group">
              <label for="storeName">Shop Name</label>
              <input type="text" id="storeName" placeholder="My Shop" />
            </div>
            <div class="form-group">
              <label for="storeCity">City</label>
              <input type="text" id="storeCity" placeholder="New Delhi" />
            </div>
            <div class="form-group">
              <label for="storeAddress">Address</label>
              <input
                type="text"
                id="storeAddress"
                placeholder="123 Market Street"
              />
            </div>

            <button
              type="button"
              class="btn btn-secondary"
              onclick="findAddressOnMap()"
              style="width: 100%; margin-bottom: 1rem; padding: 0.5rem"
            >
              <i class="fas fa-search"></i> Find Shop on Map
            </button>

            <div class="form-group">
              <label for="storePhone">Phone</label>
              <input type="tel" id="storePhone" placeholder="+91 9876543210" />
            </div>

            <div class="form-group">
              <label>Pin your Shop Location</label>
              <div
                id="map"
                style="
                  width: 100%;
                  height: 250px;
                  border-radius: 8px;
                  margin-bottom: 10px;
                  border: 1px solid #d1d5db;
                "
              ></div>
              <input type="hidden" id="storeLat" />
              <input type="hidden" id="storeLon" />
            </div>
          </div>

          <button class="btn btn-primary" onclick="handleSignup()">
            Create Account
          </button>
        </div>
      </div>
    </div>

    <script
      src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="./auth.js"></script>
  </body>
</html>
